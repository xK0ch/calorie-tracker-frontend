<mat-toolbar class="top-nav">
  <span class="app-title">Kalorientracker</span>
  <div class="profile-selector">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-select
        [value]="profileService.activeProfileId()"
        (selectionChange)="profileService.setActiveProfile($event.value)"
        placeholder="Profil">
        @for (profile of profileService.profiles(); track profile.id) {
          <mat-option [value]="profile.id">{{ profile.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <a mat-icon-button routerLink="/profiles" aria-label="Profile verwalten">
      <mat-icon>manage_accounts</mat-icon>
    </a>
  </div>
  <nav class="desktop-nav">
    <a mat-button routerLink="/calendar" routerLinkActive="active-link">
      <mat-icon>calendar_month</mat-icon>
      Kalender
    </a>
    <a mat-button routerLink="/ingredients" routerLinkActive="active-link">
      <mat-icon>egg</mat-icon>
      Zutaten
    </a>
    <a mat-button routerLink="/meals" routerLinkActive="active-link">
      <mat-icon>lunch_dining</mat-icon>
      Gerichte
    </a>
    <a mat-button routerLink="/settings" routerLinkActive="active-link">
      <mat-icon>settings</mat-icon>
      Einstellungen
    </a>
  </nav>
</mat-toolbar>

<main class="content">
  <router-outlet />
</main>

<nav class="mobile-nav">
  <a routerLink="/calendar" routerLinkActive="active-link">
    <mat-icon>calendar_month</mat-icon>
    <span>Kalender</span>
  </a>
  <a routerLink="/ingredients" routerLinkActive="active-link">
    <mat-icon>egg</mat-icon>
    <span>Zutaten</span>
  </a>
  <a routerLink="/meals" routerLinkActive="active-link">
    <mat-icon>lunch_dining</mat-icon>
    <span>Gerichte</span>
  </a>
  <a routerLink="/settings" routerLinkActive="active-link">
    <mat-icon>settings</mat-icon>
    <span>Einstellungen</span>
  </a>
</nav>
