<div class="page-container">
  <h1>Einstellungen</h1>

  <mat-card>
    <mat-card-header>
      <mat-card-title>Kalorienziel</mat-card-title>
      <mat-card-subtitle>Dein tägliches Kalorienziel</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field class="full-width">
        <mat-label>Kalorien pro Tag (kcal)</mat-label>
        <input matInput type="number" [value]="calorieGoal()" (input)="calorieGoal.set(+$any($event.target).value)">
        <mat-icon matSuffix>local_fire_department</mat-icon>
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
      <button mat-flat-button (click)="save()">
        <mat-icon>save</mat-icon>
        Speichern
      </button>
    </mat-card-actions>
  </mat-card>
</div>
